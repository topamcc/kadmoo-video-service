# Redis is NOT published to the host — only video-api / video-worker reach it (safer on RunPod).
services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  video-api:
    build: .
    restart: unless-stopped
    ports:
      - "4100:4100"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    # Uncomment on GPU host:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  video-worker:
    build: .
    restart: unless-stopped
    command: >
      celery -A worker.celery_app worker -l info -c 1 -Q video-jobs
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
